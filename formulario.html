<!DOCTYPE html>
<html>
<head>
    <title>Evaluación Solar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="card">
    <h2>Evaluación Solar</h2>
    <p>Completa los datos para analizar tu caso</p>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="number" id="consumo" placeholder="Consumo mensual (kWh)">

    <p>¿Tu zona tiene buena exposición solar?</p>
    <select id="zona">
        <option value="">Selecciona</option>
        <option value="alta">Alta ☀️</option>
        <option value="media">Media 🌤️</option>
        <option value="baja">Baja 🌥️</option>
    </select>

    <button onclick="evaluar()">Analizar</button>
</div>

<script src="script.js"></script>
</body>
</html>
